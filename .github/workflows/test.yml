name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      NODE_ENV: test
      PORT: 5001
      MONGODB_URI: mongodb://127.0.0.1:27017/intellihostel_test
      JWT_SECRET: test_jwt_secret_very_secure_key_123456
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5173
      EMAIL_HOST: smtp.gmail.com
      EMAIL_PORT: 587
      EMAIL_SECURE: false
      EMAIL_USER: test@example.com
      EMAIL_PASS: testpassword
      EMAIL_FROM: IntelliHostel <test@example.com>

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm install

      - name: Run backend tests
        run: npm test

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      VITE_API_URL: http://localhost:5001/api/v1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Run frontend tests
        run: npm test